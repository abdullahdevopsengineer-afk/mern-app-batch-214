name: Build and Deploy to Kind

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker images
        run: |
          docker build -t backend:latest ./server
          docker build -t frontend:latest ./client

      - name: Tag images
        run: |
          docker tag backend:latest devopsabdullah45/mern-blog-backend215:v1
          docker tag frontend:latest devopsabdullah45/mern-blog-frontend215:v1

      - name: Push images
        run: |
          docker push devopsabdullah45/mern-blog-backend215:v1
          docker push devopsabdullah45/mern-blog-frontend215:v1

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_SSH_PORT }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/mern-app-batch-214 || git clone https://github.com/abdullahdevopsengineer-afk/mern-app-batch-214.git

            cd ~/mern-app-batch-214
      