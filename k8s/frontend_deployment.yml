apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-frontend
  namespace: mern
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mern-frontend
  template:
    metadata:
      labels:
        app: mern-frontend
    spec:
      containers:
      - name: frontend
        image: devopsabdullah45/mern-blog-214:frontend01
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: mern
spec:
  type: LoadBalancer
  selector:
    app: mern-frontend
  ports:
  - port: 80
    targetPort: 3000